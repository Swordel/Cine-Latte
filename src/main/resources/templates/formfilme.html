<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Filme — Cine Latte</title>
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <link rel="stylesheet" th:href="@{/css/formfilme.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>
    <!-- ========== HEADER ========== -->
<header>

    <div class="logo-area">
        <div class="logo">
            <img th:src="@{/images/logo.png}" alt="Logo Cine Latte">
        </div>

        <div>   
            <h1>CINE LATTE</h1>
                <p>Bom filme. Bom café. Boa companhia.</p>
        </div> 
    </div>    

</header>

<!-- ========== FORMULÁRIO ========== -->
    <div class="form-wrapper">
        <h2 class="form-title">Cadastro de Filme</h2>
 
        <form action="#" th:action="@{/filme/cadastro}" method="post" th:object="${filme}" class="form-card">
 
            <div class="form-group">
                <label>Título</label>
                <input type="text" th:field="*{titulo}" placeholder="Ex: O Diabo Veste Prada 2">
            </div>
 
            <div class="form-group">
                <label>Sinopse</label>
                <textarea th:field="*{sinopse}" placeholder="Descrição do filme..." rows="4"></textarea>
            </div>
 
            <div class="form-row">
                <div class="form-group">
                    <label>Duração (min)</label>
                    <input type="text" th:field="*{duracao}" placeholder="Ex: 90">
                </div>
            
                <div class="form-group">
                    <label>Classificação</label>
                    <select th:field="*{classificacao}">
                        <option value="L">Livre</option>
                        <option value="10">10</option>
                        <option value="12">12</option>
                        <option value="14">14</option>
                        <option value="16">16</option>
                        <option value="18">18</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Nota</label>
                    <input type="number" th:field="*{nota}" placeholder="Ex: 9.2" step="0.1" min="0" max="10">
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select th:field="*{status}">
                        <option value="EM_CARTAZ">Em Cartaz</option>
                        <option value="EM_BREVE">Em Breve</option>
                    </select>
                </div>
            </div>

            <!-- Gêneros via checkboxes gerados pelo Enum -->
            <div class="form-group">
                <label>Gêneros</label>
                <div class="checkboxes">
                    <label th:each="genero : ${generos}" class="checkbox-item">
                        <input type="checkbox" name="generos" th:value="${genero.name()}">
                        <span th:text="${genero.descricao}"></span>
                    </label>
                </div>
            </div>
 
            <div class="form-row">
                <div class="form-group">
                    <label>Pôster (nome do arquivo)</label>
                    <input type="text" th:field="*{imagem}" placeholder="Ex: cartazPrada.png">
                </div>
            </div>
 
            <button type="submit" class="submit-btn">CADASTRAR FILME</button>
 
        </form>
    </div>

 
</body>
</html>
