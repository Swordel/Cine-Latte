<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cine Latte - ERRO</title>
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <link rel="stylesheet" th:href="@{/css/error.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="error-wrapper">
        <h2 class="erro-titulo">Você navegou tanto que chegou até aqui...</h2>
        <div class="erro-info">
            <p th:text="${status}"></p>  
            <p th:text="${error}"></p>
        </div>
        <img th:src="@{/images/erroDog.jpg}" alt="Corgi com café">
        <p class="erro-sub">
                Use o sistema direito.<br>Não sufoque o artista!
        </p>  
        <button class="back-btn" onclick="history.back()">VOLTAR</button>
    </div>

</body>
</html>
